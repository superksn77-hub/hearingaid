name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (Expo)
        run: npx expo export --platform web

      # 빌드 결과 경로 검증 (/hearingaid/ 포함 여부)
      - name: Verify asset paths
        run: |
          echo "=== index.html script/link tags ==="
          grep -E "script src|link rel" dist/index.html
          if grep -q 'src="/_expo/' dist/index.html; then
            echo "❌ ERROR: JS 경로에 /hearingaid/ 가 없음 — app.json experiments.baseUrl 확인 필요"
            exit 1
          fi
          echo "✅ 경로 정상 확인"

      # Jekyll 비활성화 (_expo/ 같은 _로 시작하는 폴더가 무시되는 문제 방지)
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      # SPA 라우팅을 위한 404.html 생성
      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy HICOG 청력검사 — ${{ github.sha }}'
